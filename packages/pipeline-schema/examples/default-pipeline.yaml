# Default auto-finish pipeline: 4 stages, 2 human gates.
#
#   需求分析 → 方案设计 (gate) → 实施 → 验证 (gate, before merge)
#
# Artifact paths are sandbox-relative under .auto-finish/artifacts/<stage>/.
id: default
name: Default 4-stage pipeline
version: "1.0.0"

stages:
  - name: 需求分析
    agent_config:
      system_prompt: |
        你是需求分析师。读取用户提交的需求描述，输出一份结构化的 PRD：
        包含背景、目标、受影响 repo、核心用户故事、非目标。
        不要写实施细节，那是下一道工序的事。
      allowed_tools:
        - Read
        - Write
        - Grep
        - Glob
    artifacts:
      - path: .auto-finish/artifacts/需求分析/prd.md
        type: markdown
        description: 结构化的 PRD，作为后续工序的输入
        required: true
    on_failure: pause

  - name: 方案设计
    agent_config:
      system_prompt: |
        你是方案设计师。基于上一步的 PRD，输出一份跨 repo 的实施方案：
        包含数据流、API 契约、每个 repo 的改动清单、风险与回滚策略。
        最后必须列出明确的跨 repo 改动顺序提示。
      allowed_tools:
        - Read
        - Write
        - Grep
        - Glob
    artifacts:
      - path: .auto-finish/artifacts/方案设计/design.md
        type: markdown
        description: 跨 repo 实施方案，人工 review 后才放行实施
        required: true
    gate:
      required: true
      review_targets:
        - .auto-finish/artifacts/方案设计/design.md
    on_failure: pause

  - name: 实施
    agent_config:
      system_prompt: |
        你是实施工程师。按照方案设计文档落地代码改动，覆盖所有受影响 repo。
        小步提交、保持每次改动可解释。完成后输出本轮的 diff 摘要。
      allowed_tools:
        - Read
        - Write
        - Edit
        - Grep
        - Glob
        - Bash(git:*)
        - Bash(npm:*)
        - Bash(pnpm:*)
    artifacts:
      - path: .auto-finish/artifacts/实施/diff-summary.md
        type: markdown
        description: 本轮代码改动摘要（人类可读版）
        required: true
      - path: .auto-finish/artifacts/实施/changes.diff
        type: diff
        description: 聚合后的统一 diff，便于 dashboard 预览
        required: false
    on_failure: retry

  - name: 验证
    agent_config:
      system_prompt: |
        你是验证工程师。按照每个 repo 的 test_command 跑测试，
        汇总结果到 test-report.md，列出失败用例并给出最小复现路径。
        全绿才推送 PR；否则把错误回报给实施工序。
      allowed_tools:
        - Read
        - Write
        - Bash(npm test:*)
        - Bash(pnpm test:*)
        - Bash(pytest:*)
        - Bash(git:*)
    artifacts:
      - path: .auto-finish/artifacts/验证/test-report.md
        type: markdown
        description: 各 repo 测试结果聚合，gate 审核此文件
        required: true
    gate:
      required: true
      review_targets:
        - .auto-finish/artifacts/验证/test-report.md
        - .auto-finish/artifacts/实施/diff-summary.md
    on_failure: pause
