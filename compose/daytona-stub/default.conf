server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Catch-all: anything the orchestrator pings (e.g. /api/...) gets a clear
    # 503 with a JSON hint rather than nginx's default 404.
    location / {
        try_files $uri $uri/ @stub_message;
    }

    location @stub_message {
        default_type application/json;
        return 503 '{"error":"daytona_stub","message":"Daytona is not running. See http://localhost:${DAYTONA_PORT:-3986}/ for setup instructions."}';
    }
}
